# Installer config — fill in your own values. This file is tracked in git,
# so don't commit real password hashes; leave USER_PASSWORD_HASH unset and
# let the installer prompt for it instead.
#
# Password hashes must be quoted with SINGLE quotes — they contain literal
# '$' characters which bash would otherwise try to expand as variables.
#
# Generate a hash with:
#   openssl passwd -6 'your-password-here'

HOSTNAME=voyd
USERNAME=sn0w
TIMEZONE=Europe/Vienna
KEYMAP=us

# Locale is hardcoded to en_US.UTF-8 by the installer, independent of keymap.

# Left unset: the installer will prompt for it interactively (via
# generate-password.sh) and write it back here. To set it ahead of time
# instead, uncomment and fill in a real hash from 'openssl passwd -6'.
# USER_PASSWORD_HASH='$6$saltsalt$therealhashgoeshere'

# Root's password defaults to the same hash as USER_PASSWORD_HASH above.
# Uncomment to give root a different password instead.
# ROOT_PASSWORD_HASH='$6$saltsalt$therealhashgoeshere'

# Disk layout, all sizes in MiB. These are the defaults if left unset —
# uncomment to override.
# BOOT_SIZE_MB=254
# SWAP_SIZE_MB=8192
# MIN_ROOT_MB=4096
